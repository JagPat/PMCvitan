# Local development services for Vitan PMC.
# Postgres for the Phase 7 API. Run: docker compose -f infra/docker-compose.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: vitan-pmc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vitan
      POSTGRES_PASSWORD: vitan
      POSTGRES_DB: vitan_pmc
    ports:
      - '5432:5432'
    volumes:
      - vitan-pmc-pgdata:/var/lib/postgresql/data

volumes:
  vitan-pmc-pgdata:
