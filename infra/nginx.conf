# Static-SPA server for the Vitan PMC web app.
# Included as /etc/nginx/conf.d/default.conf inside the nginx:alpine image.
server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # long-cache the content-hashed build assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # never cache the entry document (so new deploys are picked up)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # the service worker must revalidate so SW updates roll out cleanly
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    # client-side routing: fall back to index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}
