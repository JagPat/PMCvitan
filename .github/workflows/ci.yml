name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm --filter web typecheck
      - name: Lint
        run: pnpm --filter web lint
      - name: Unit tests
        run: pnpm --filter web test
      - name: Build
        run: pnpm --filter web build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: End-to-end tests
        run: pnpm --filter web test:e2e

  # Phase 0 acceptance gate: the two-project Playwright suite over the REAL
  # stack (NestJS + seeded PostgreSQL + the web app in API mode). Phase 0 is
  # complete only when this job is green — unit tests or the seeded demo alone
  # are insufficient evidence (docs/ROADMAP.md).
  api-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pmcvitan_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # a disposable database — scripts/test-api-e2e.sh wipes and reseeds it
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pmcvitan_e2e?schema=public
      JWT_SECRET: ci-api-e2e-secret-not-used-in-production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prisma generate
        run: pnpm --filter api prisma:generate
      - name: Install Playwright Chromium
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: Two-project acceptance suite (migrate + seed + Playwright over the real API)
        run: pnpm test:e2e:api
      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-e2e-traces
          path: apps/web/test-results/
          retention-days: 7

  # Phase 1 acceptance evidence (Task 7 Step 2): a legacy pre-Phase-1 database
  # is rebuilt from the real ledger, planted with representative legacy shapes,
  # upgraded through ALL Phase 1 migrations the way Prisma applies them, and
  # asserted to keep every legacy meaning intact. Pure psql — no build needed.
  upgrade-proof:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Upgraded-database proof (legacy fixture through all Phase 1 migrations)
        run: bash apps/api/scripts/upgrade-proof.sh

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pmcvitan_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # a REAL disposable PostgreSQL (service above): migrations, constraints and
      # live-access behavior are exercised, not mocked
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pmcvitan_test?schema=public
      JWT_SECRET: ci-integration-secret-not-used-in-production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prisma generate
        run: pnpm --filter api prisma:generate
      - name: Apply migrations to the test database
        run: pnpm --filter api prisma:migrate
      - name: Unit tests
        run: pnpm --filter api test
      - name: Integration tests (real app over real PostgreSQL)
        run: pnpm --filter api test:integration
      - name: Typecheck
        run: pnpm --filter api typecheck
      - name: Build
        run: pnpm --filter api build
