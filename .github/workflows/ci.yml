name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm --filter web typecheck
      - name: Lint
        run: pnpm --filter web lint
      - name: Unit tests
        run: pnpm --filter web test
      - name: Build
        run: pnpm --filter web build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: End-to-end tests
        run: pnpm --filter web test:e2e

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pmcvitan_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # a REAL disposable PostgreSQL (service above): migrations, constraints and
      # live-access behavior are exercised, not mocked
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pmcvitan_test?schema=public
      JWT_SECRET: ci-integration-secret-not-used-in-production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prisma generate
        run: pnpm --filter api prisma:generate
      - name: Apply migrations to the test database
        run: pnpm --filter api prisma:migrate
      - name: Unit tests
        run: pnpm --filter api test
      - name: Integration tests (real app over real PostgreSQL)
        run: pnpm --filter api test:integration
      - name: Typecheck
        run: pnpm --filter api typecheck
      - name: Build
        run: pnpm --filter api build
